name: Desktop release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Existing tag to build
        required: true
        type: string

permissions:
  contents: write

env:
  NEXT_TELEMETRY_DISABLED: "1"

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-13
            args: --target x86_64-apple-darwin
            rust_target: x86_64-apple-darwin
          - platform: macos-14
            args: --target aarch64-apple-darwin
            rust_target: aarch64-apple-darwin
          - platform: ubuntu-24.04
            args: ""
            rust_target: x86_64-unknown-linux-gnu
          - platform: windows-2025
            args: ""
            rust_target: x86_64-pc-windows-msvc
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag }}
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: dtolnay/rust-toolchain@1.85.0
        with:
          targets: ${{ matrix.rust_target }}
      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-24.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential curl wget file libssl-dev libgtk-3-dev \
            libayatana-appindicator3-dev librsvg2-dev libwebkit2gtk-4.1-dev patchelf
      - run: npm install --no-audit --no-fund
      - run: python scripts/validate_repo.py
      - run: PYTHONPATH=services/tts-worker python -W error::ResourceWarning -m unittest discover -s services/tts-worker/tests -v
      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ inputs.tag }}
          releaseName: AudiobookGen ${{ inputs.tag }}
          releaseDraft: true
          prerelease: true
          args: ${{ matrix.args }}
