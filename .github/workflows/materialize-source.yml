name: Materialize AudiobookGen source

on:
  push:
    branches:
      - agent/materialize-source
  workflow_dispatch:

permissions:
  contents: write

jobs:
  materialize:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/materialize-source
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Materialize source tree
        run: python .bootstrap/materialize.py
      - name: Remove bootstrap data
        run: rm -rf .bootstrap .checkpoint .github/workflows/materialize.yml
      - name: Commit materialized source
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Build AudiobookGen vertical slice"
          git push origin HEAD:agent/materialize-source
