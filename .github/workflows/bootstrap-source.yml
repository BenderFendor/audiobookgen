name: Bootstrap source

on:
  push:
    branches:
      - agent/build-audiobookgen
    paths:
      - ".bootstrap/**"
      - ".github/workflows/bootstrap-source.yml"
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  unpack:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/build-audiobookgen
          fetch-depth: 0

      - name: Reconstruct archive
        shell: bash
        run: |
          cat .bootstrap/part-*.b64 | base64 --decode > /tmp/project.tar.gz
          echo "c57a7b55498318bdbca248155cfe7833c602d458cfb7bfa1a491a610947d4db4  /tmp/project.tar.gz" | sha256sum -c -

      - name: Unpack project
        shell: bash
        run: |
          tar -xzf /tmp/project.tar.gz
          rm -rf .bootstrap
          rm -f .github/workflows/bootstrap-source.yml

      - name: Commit source
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Build AudiobookGen vertical slice"
          git push origin HEAD:agent/build-audiobookgen
