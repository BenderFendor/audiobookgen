name: CI

on:
  push:
    branches: [main, "agent/**"]
  pull_request:

permissions:
  contents: read

env:
  NEXT_TELEMETRY_DISABLED: "1"

jobs:
  repository:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python scripts/validate_repo.py
      - run: PYTHONPATH=services/tts-worker python -W error::ResourceWarning -m unittest discover -s services/tts-worker/tests -v
      - run: python scripts/e2e_mock_worker.py

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm test
      - run: npm run build

  rust:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Install Tauri system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential curl wget file libssl-dev libgtk-3-dev \
            libayatana-appindicator3-dev librsvg2-dev libwebkit2gtk-4.1-dev patchelf
      - uses: dtolnay/rust-toolchain@1.88.0
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: Stub frontend dist for tauri::generate_context!
        run: mkdir -p out
      - run: cargo fmt --all -- --check
      - run: cargo test -p audiobookgen-core --all-targets
      - run: cargo clippy --workspace --all-targets -- -D warnings
      - run: cargo check -p audiobookgen-desktop
